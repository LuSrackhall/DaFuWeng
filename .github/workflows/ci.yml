name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Lint commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FROM="${{ github.event.pull_request.base.sha }}"
            TO="${{ github.event.pull_request.head.sha }}"
          else
            FROM="${{ github.event.before }}"
            TO="${{ github.sha }}"
          fi

          if [ "$FROM" = "0000000000000000000000000000000000000000" ]; then
            FROM=$(git rev-list --max-parents=0 HEAD)
          fi

          pnpm exec commitlint --from "$FROM" --to "$TO" --verbose

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Lint TypeScript workspace
        run: pnpm lint
      - name: Run TypeScript tests
        run: pnpm test
      - name: Build frontend workspace
        run: pnpm build
      - name: Install Playwright browser
        run: pnpm --filter @dafuweng/frontend exec playwright install chromium
      - name: Run frontend end-to-end test
        run: pnpm --filter @dafuweng/frontend test:e2e

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Run Go tests
        working-directory: backend
        run: go test ./...

  workflow-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Run workflow hook tests
        run: python -m unittest discover -s .github/hooks/scripts/tests -p 'test_*.py'

  agent-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Validate persistent agent iteration policy
        run: python .github/hooks/scripts/validate_agent_iteration_policy.py

  pr-governance:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Validate PR iteration governance
        run: python .github/hooks/scripts/validate_pr_iteration_governance.py

  openspec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate OpenSpec structure
        run: |
          test -f openspec/config.yaml
          test -d openspec/changes

          mapfile -t active_changes < <(find openspec/changes -mindepth 1 -maxdepth 1 -type d ! -name archive -exec basename {} \; | sort)

          if [ "${#active_changes[@]}" -eq 0 ]; then
            echo "No active OpenSpec changes found under openspec/changes"
            exit 1
          fi

          for change in "${active_changes[@]}"; do
            change_dir="openspec/changes/$change"

            for required_file in .openspec.yaml proposal.md design.md tasks.md; do
              if [ ! -f "$change_dir/$required_file" ]; then
                echo "Missing required OpenSpec artifact: $change_dir/$required_file"
                exit 1
              fi
            done
          done

          echo "Validated OpenSpec changes:"
          printf ' - %s\n' "${active_changes[@]}"
