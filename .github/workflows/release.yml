name: release

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Consume release evidence artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/hooks/scripts/consume_release_evidence.py
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Run semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release
      - name: Upload release summary artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: |
            release-notes.md
            .artifacts/release-evidence/release-evidence-summary.md
            .artifacts/release-evidence/release-bilingual-summary.md
      - name: Upload marketing summary artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: marketing-summary
          path: .artifacts/release-evidence/release-marketing-summary.md
